name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Run example fixture (must exit non-zero with violation)
        run: |
          set +e
          pnpm tsx examples/code-review-agent/run.ts
          status=$?
          set -e
          if [ "$status" -ne 1 ]; then
            echo "Expected exit 1 (ToolRouteViolation thrown), got $status"
            exit 1
          fi
      - name: Verify illegal-call.demo.ts produces a type error
        run: |
          set +e
          npx tsc --noEmit examples/code-review-agent/illegal-call.demo.ts \
            --target ES2022 --module ESNext --moduleResolution Bundler \
            --strict --skipLibCheck
          status=$?
          set -e
          if [ "$status" -ne 2 ]; then
            echo "Expected tsc exit 2 (type error), got $status"
            exit 1
          fi

  docs-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: docs-site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
