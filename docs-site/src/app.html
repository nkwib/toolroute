<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Vercel AI SDK companion that turns tool definitions into a typed routing graph. Compile-time narrowing plus a 50-line runtime guard."

    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ToolRoute" />

      property="og:description"
      content="Each tool declares its legal nextAllowed successors. Compile-time narrowing plus a 50-line runtime guard reject the same illegal call from both sides."

    <meta property="og:url" content="https://toolroute.pages.dev/" />
    <meta property="og:image" content="https://toolroute.pages.dev/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="ToolRoute — three nodes labelled search, review, commit connected by arrows; an illegal arrow from search to commit struck through."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ToolRoute — typed routing graph for the Vercel AI SDK" />
    <meta
      name="twitter:description"
      content="Each tool declares its legal nextAllowed successors. Compile-time narrowing plus a 50-line runtime guard."
    />
    <meta name="twitter:image" content="https://toolroute.pages.dev/og.png" />

    %sveltekit.head%
